<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->

<!--[if gt IE 8]><!--> <html class="no-js"> <!--<![endif]-->
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="Codaweb: moderne, razendsnelle websites en webapps op maat">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main>
            <header>
                <nav>
                    <img src="./images/logo.svg" alt="" class="logo">
                    <div class="links">
                        <a href="#">About</a>
                        <a href="#">Docs</a>
                        <button class="buttonMed" href="#">Login</button>
                    </div>
                </nav>
            </header>
            <section class="info">
                <h1 class="heroFont">Niet langer is uw website de bottleneck van uw bedrijf</h1>
                <div class="icons">
                    <div class="icon">
                        <img src="images/speedIcon.svg" alt="lightning icon">
                        <div class="iconInfo">
                            <p class="iconTop">razend-</p>
                            <p class="iconBottom">Snel</p>
                        </div>
                    </div>
                    <div class="icon">
                        <img src="images/saveIcon.svg" alt="cloud icon">
                        <div class="iconInfo">
                            <p class="iconTop">verbeterde</p>
                            <p class="iconBottom">Veiligheid</p>
                        </div>
                    </div>
                    <div class="icon">
                        <img src="images/modernIcon.svg" alt="diamond icon">
                        <div class="iconInfo">
                            <p class="iconTop">smaakvol</p>
                            <p class="iconBottom">Modern</p>
                        </div>
                    </div>
                </div>
            </section>
            <section class="features">
                <div class="feature">
                    <img src="images/speedtestIcon.svg" alt="speed test icon">
                    <div class="featureInfo">
                        <p class="featureTop">Laat uw klanten niet wachten</p>
                        <p class="featureCta">Doe een gratis snelheidsmeting</p>
                    </div>
                </div>
                <div class="feature">
                    <img src="images/appointmentIcon.svg" alt="appointment icon">
                    <div class="featureInfo">
                        <p class="featureTop">bespreek uw mogelijkheden</p>
                        <p class="featureCta">Maak meteen een vrijblijvende afspraak</p>
                    </div>
                </div>
            </section>
            
        </main>
    </body>
</html>
